    // --- LÓGICA DE EXIBIÇÃO ---
    function exibirMensagem() {
        const nomeParaExibir = nomeDoPresenteado.trim();

        if (!nomeParaExibir) {
            document.getElementById('mensagem').innerHTML = "ERRO: Por favor, preencha o nome na Linha 6 do script antes de salvar o arquivo!";
            document.getElementById('dia-do-ano').innerText = "Personalização Necessária";
            return;
        }

        const agora = new Date();
        const inicioDoAno = new Date(agora.getFullYear(), 0, 1);
        const diferencaEmMilissegundos = agora - inicioDoAno;
        const umDiaEmMilissegundos = 1000 * 60 * 60 * 24; 
        
        // Corrigindo para o último dia do ano, se necessário.
        let diaDoAno = Math.floor(diferencaEmMilissegundos / umDiaEmMilissegundos) + 1;
        
        const indiceDaFrase = (diaDoAno - 1) % frasesSalmos.length;

        const fraseDoDia = frasesSalmos[indiceDaFrase] || "O Senhor é o meu pastor; nada me faltará.";

        const mensagemCompleta = `${nomeParaExibir}, ${fraseDoDia}`;

        document.getElementById('mensagem').innerText = mensagemCompleta;
        document.getElementById('dia-do-ano').innerText = `Salmos do Dia ${diaDoAno}`;
    }

    exibirMensagem();
</script>
